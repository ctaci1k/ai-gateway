# AI Gateway — nginx reverse proxy (PH12).
# Single entrypoint: "/" → frontend, "/api/" → backend (prefix stripped).
# HTTP-only (works for local `docker compose up`). For TLS see DEPLOY.md.

upstream frontend_upstream {
    server frontend:3000;
}
upstream backend_upstream {
    server backend:8000;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # Allow document uploads (RAG). Keep in sync with RAG_MAX_FILE_BYTES.
    client_max_body_size 10m;

    # Security headers (HSTS is added in the TLS server block — see DEPLOY.md).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API — strip the /api prefix (trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the original scheme set by the upstream aaPanel proxy (https),
        # so the backend marks session cookies Secure correctly behind TLS.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;

        # Chat streams token-by-token (SSE / chunked). Disable proxy buffering so
        # chunks reach the browser immediately instead of being held by nginx.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Next.js build assets are content-hashed → safe to cache forever (PH24/I3).
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Frontend (Next.js).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Never cache the HTML document (PH24/I3): the upstream aaPanel nginx
        # caches proxied responses, which previously served a stale page with an
        # old CSS hash after deploys. no-store keeps the shell fresh while the
        # hashed /_next/static assets above stay immutable.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }
}
