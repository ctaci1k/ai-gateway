# AI Gateway — full stack (PH12): db + backend + frontend + nginx.
# Local:
#   cp .env.production.example .env.production
#   docker compose --env-file .env.production up --build
# Then open http://localhost  (API is proxied under /api).
# The --env-file flag makes the ${VAR} substitutions below resolve from
# .env.production (the same file is also injected into the backend container).
#
# Note: ChromaDB runs embedded inside the backend (PersistentClient) and persists
# to the `chroma` volume — there is intentionally no separate Chroma service,
# because the application code uses the embedded client (see DEPLOY.md).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CHROMA_PATH: /app/chroma_data
    volumes:
      - chroma:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin API base; nginx proxies /api → backend.
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  chroma:
