name: Deploy

# CD: збирає образи backend+frontend, пушить у GHCR, потім деплоїть на VPS
# (SSH → docker compose pull && up -d). Запускається після пушу в main —
# і лише якщо CI (.github/workflows/ci.yml) пройшов зелено для цього коміту.
# Також доступний ручний запуск через вкладку Actions (workflow_dispatch).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Не дозволяємо двом деплоям накладатись; новий скасовує попередній.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/ctaci1k/ai-gateway-backend
  IMAGE_FRONTEND: ghcr.io/ctaci1k/ai-gateway-frontend

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    # На push-тригер деплоїмо тільки коли CI завершився успіхом.
    # На ручний workflow_dispatch — завжди.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Resolve commit SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Кладемо актуальний prod-compose + nginx-конфіг на сервер (єдине джерело
      # правди — git). scp-action зберігає відносну структуру шляхів, тож
      # deploy/nginx/nginx.conf ляже у /opt/ai-gateway/deploy/nginx/nginx.conf —
      # саме туди, куди дивиться bind-mount у docker-compose.prod.yml.
      - name: Copy compose + nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,deploy/nginx/nginx.conf"
          target: "/opt/ai-gateway"
          # Overwrite existing files so re-deploys are idempotent — without this,
          # tar refuses to unpack over an existing nginx.conf ("File exists").
          overwrite: true

      - name: Pull & restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        # App secrets normally live only in /opt/ai-gateway/.env.production on the
        # host, but the owner has no direct host-file access (containerised setup).
        # So MISTRAL_API_KEY is kept as a GitHub Secret and synced into that file
        # here, before `up -d`. Add more keys to both `env:` and `envs:` to manage
        # them the same way.
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # KEK for BYOK at-rest encryption (D-20). Without it the API refuses to
          # store any user key ("Key storage is not configured"). Kept as a GitHub
          # Secret and synced into .env.production, same as MISTRAL_API_KEY.
          # IMPORTANT: never rotate this value — changing it invalidates every
          # already-stored key (users would have to re-enter them).
          BYOK_ENCRYPTION_KEY: ${{ secrets.BYOK_ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: MISTRAL_API_KEY,BYOK_ENCRYPTION_KEY
          script: |
            set -e
            cd /opt/ai-gateway
            # Sync GitHub-managed secrets into the host env file (idempotent).
            # Skipped when empty so a missing/unset secret never blanks an existing
            # value; updates in place if present, appends otherwise.
            sync_env() {
              local key="$1" val="$2"
              [ -n "$val" ] || return 0
              touch .env.production
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env.production
              else
                echo "${key}=${val}" >> .env.production
              fi
            }
            sync_env MISTRAL_API_KEY "${MISTRAL_API_KEY}"
            sync_env BYOK_ENCRYPTION_KEY "${BYOK_ENCRYPTION_KEY}"
            export IMAGE_TAG=${{ needs.build-push.outputs.sha }}
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
